name: IraqueCore
version: 1.0.0
main: gg.leo.IraqueCore.IraqueCore
api-version: '26.2'

commands:
  rank:
    description: Rank management command
    aliases: [ranks]
    permission: iraquecore.rank
  tags:
    description: Tag management with GUI
    aliases: [tag]
    permission: iraquecore.tags.use
  msg:
    description: Send a private message to a player
    aliases: [message, whisper, tell, w, m]
    permission: iraquecore.msg
  r:
    description: Reply to the last private message
    aliases: [reply]
    permission: iraquecore.msg
  scoreboard:
    description: Toggle your scoreboard on/off
    aliases: [sb]
    permission: iraquecore.scoreboard
  reload:
    description: Reload all plugin configurations
    aliases: [icreload]
    permission: iraquecore.reload
  spawn:
    description: Teleport to spawn
    aliases: [hub, lobby]
  setspawn:
    description: Set the spawn location
    permission: iraquecore.setspawn
  gm:
    description: Change gamemode
    aliases: [gamemode, gmc, gms, gma, gmsp]
    permission: iraquecore.gamemode
  leaderboards:
    description: View player leaderboards
    aliases: [lb, leaders]
    permission: iraquecore.leaderboard
  motd:
    description: Reload MOTD configuration
    permission: iraquecore.motd.reload
  whitelist:
    description: Manage server whitelist
    aliases: [wl]
    permission: iraquecore.whitelist
  playtime:
    description: Check your playtime
    aliases: [pt]
    permission: iraquecore.playtime
  stats:
    description: View player stats
    aliases: [me]
    permission: iraquecore.stats
  iraquecore:
    description: Plugin info
    aliases: [ic, core]
    permission: iraquecore.info

permissions:
  iraquecore.*:
    description: All IraqueCore permissions
    default: op
    children:
      iraquecore.admin: true
      iraquecore.tags.use: true
      iraquecore.tags.admin: true
      iraquecore.msg: true
      iraquecore.reload: true
      iraquecore.setspawn: true
      iraquecore.gamemode: true
      iraquecore.gamemode.other: true
      iraquecore.whitelist: true
  iraquecore.admin:
    description: Access to admin commands
    default: op
  iraquecore.rank:
    description: Access to rank commands
    default: op
  iraquecore.rank.set:
    description: Set a player's rank
    default: op
  iraquecore.rank.create:
    description: Create custom ranks
    default: op
  iraquecore.tags.use:
    description: Use tag system
    default: true
  iraquecore.tags.admin:
    description: Administer tags
    default: op
  iraquecore.msg:
    description: Send and receive private messages
    default: true
  iraquecore.discord.reload:
    description: Reload Discord bot
    default: op
  iraquecore.scoreboard:
    description: Use scoreboard command
    default: true
  iraquecore.reload:
    description: Reload all plugin configurations
    default: op
  iraquecore.setspawn:
    description: Set the spawn location
    default: op
  iraquecore.gamemode:
    description: Change your gamemode
    default: op
  iraquecore.gamemode.other:
    description: Change other players' gamemode
    default: op
  iraquecore.leaderboard:
    description: View leaderboards
    default: true
  iraquecore.motd.reload:
    description: Reload MOTD configuration
    default: op
  iraquecore.whitelist:
    description: Manage server whitelist
    default: op
  iraquecore.playtime:
    description: Check your playtime
    default: true
  iraquecore.playtime.other:
    description: Check other players' playtime
    default: true
  iraquecore.anvilcolors:
    description: Use color codes in anvils
    default: true
  iraquecore.armorstand:
    description: Use armor stand editor
    default: true
  iraquecore.stats:
    description: View your stats
    default: true
  iraquecore.stats.other:
    description: View other players' stats
    default: true
  iraquecore.info:
    description: View plugin info
    default: true
