
#   IraqueCoreV2 - Advanced Core Configuration
#   Fully Configurable

# General plugin settings
general:
  # Language (en, es, etc.)
  language: en
  # Automatically check for updates
  check-updates: true
  # Date format for placeholders
  date-format: "dd/MM/yyyy HH:mm"


#   CHAT FORMAT SETTINGS

chat:
  # Global chat format
  # Placeholders:
  #   {prefix} - Rank prefix
  #   {suffix} - Rank suffix
  #   {player} - Player name
  #   {displayname} - Player display name
  #   {message} - Chat message
  #   {tag} - Equipped tag
  #   {world} - World name
  format: "{prefix}{tag}{player}{suffix}: {message}"
  # Whether to use ranks in chat
  use-ranks: true
  # Whether to use tags in chat
  use-tags: true


#   RANK SYSTEM

ranks:
  # Default rank given to new players
  default-rank: "Member"
  # List of predefined ranks
  ranks:
    Owner:
      prefix: "&4&lOwner &4"
      suffix: ""
      weight: 100
      color: "&4"
      permissions:
        - "iraquecore.*"
    Admin:
      prefix: "&c&lAdmin &c"
      suffix: ""
      weight: 90
      color: "&c"
      permissions:
        - "iraquecore.*"
    Mod:
      prefix: "&5&lMod &5"
      suffix: ""
      weight: 80
      color: "&5"
      permissions:
        - "iraquecore.rank"
        - "iraquecore.rank.set"
    VIP:
      prefix: "&6&lVIP &6"
      suffix: ""
      weight: 60
      color: "&6"
      permissions: []
    Member:
      prefix: "&7"
      suffix: ""
      weight: 50
      color: "&7"
      permissions: []


#   SCOREBOARD — IraqueSurvival

scoreboard:
  enabled: true

  # ── FADE (tu animación actual) ──
  title:
    text: "&6&lIRAQUE"
    animated: true
    ticks: 5
    type: fade
    fade: true
    fade-colors:
      - "&e"
      - "&6"
      - "&c"
      - "&d"
      - "&5"
      - "&3"
      - "&b"
      - "&a"

  # ── WAVE ──
  # title:
  #   text: "&6&lIRAQUE"
  #   animated: true
  #   ticks: 3
  #   type: wave
  #   wave-colors:
  #     - "&c"
  #     - "&6"
  #     - "&e"
  #     - "&a"
  #     - "&b"
  #     - "&9"
  #     - "&d"

  # ── BLINK ──
  # title:
  #   text: "&lIRAQUE"
  #   animated: true
  #   ticks: 10
  #   type: blink
  #   blink-bold: true
  #   blink-colors:
  #     - "&4"
  #     - "&c"
  #     - "&6"

  # ── GLITCH ──
  # title:
  #   text: "IRAQUE"
  #   animated: true
  #   ticks: 2
  #   type: glitch
  #   glitch-normal: "&f"
  #   glitch-color: "&c"

  # ── TYPING ──
  # title:
  #   text: "&6&lIRAQUE"
  #   animated: true
  #   ticks: 3
  #   type: typing
  #   typing-color: "&6"
  #   typing-cursor-color: "&7"
  #   typing-cursor: "▌"

  # ── BOUNCE ──
  # title:
  #   text: "&lIRAQUE"
  #   animated: true
  #   ticks: 4
  #   type: bounce
  #   bounce-colors:
  #     - "&6"
  #     - "&e"

  # ── SCROLL ──
  # title:
  #   text: "&6&lBienvenido a Iraque Network - El mejor servidor de PvP"
  #   animated: true
  #   ticks: 2
  #   type: scroll
  #   scroll-width: 16
  #   scroll-color: "&6"

  update:
    amount: 2
    unit: "seconds"

  lines:
    - " "
    - "&7Jugador&8: &6{player}"
    - "&7Mundo&8: &6{world}"
    - "&7Ping&8: &6{ping}ms"
    - " "
    - "&7Bloques Rotos&8: &6{blocks_broken}"
    - "&7Bloques Puestos&8: &6{blocks_placed}"
    - "&7Muertes&8: &6{deaths}"
    - " "
    - "&7Online&8: &6{online}&7/&6{max}"
    - " "
    - "&ewww.iraque.gg"


#   AFK SYSTEM
#   When a player stays still for X minutes, their prefix changes to the AFK prefix

afk:
  enabled: true
  time-minutes: 5
  prefix: "&7[AFK] &7"

#   ARMOR STAND EDITOR
#   Sneak + right-click an armor stand to open the editor

armorstand:
  enabled: true

#   ANVIL COLORS
#   Allow players to use color codes (&) in anvils

anvil:
  enabled: true

#   SLEEP VOTING
#   When enough players sleep, night is skipped

sleep:
  enabled: true
  percentage: 50.0

#   PLAYTIME TRACKING
#   Track how long each player has been online

playtime:
  enabled: true


#   GRAVES
#   When a player dies, a chest spawns with their items

grave:
  allow-others-open: false      # Solo el dueño puede abrir
  drop-on-expire: true          # Dropear items al expirar
  protect-explosions: true      # Proteger de TNT/Creepers
  expire-time: 600              # Minutos antes de expirar (0 = nunca)
  material: "CHEST"             # Material del bloque
  hologram:
    enabled: true
    format: "&6⚰ Cadaver de &e{player} &7(&f{time}&7)"
  broadcast: "&6{player} &emurió. Items en tumba: &6{x}, {y}, {z} &7- &f{world}"

#   DURABILITY WARNING
#   Warn players when their tool is about to break

durability-warning:
  enabled: true
  threshold: 0.1


#   IMAGE MOTD
#   Show an image as text art in the server list
#   Place the image file in plugins/IraqueCore/ folder

motd-image:
  enabled: false
  # Image file inside plugins/IraqueCore/images/
  file: "motd-image.png"
  # Output size in characters (width x height)
  char-width: 40
  char-height: 10
  # Also set the server favicon (64x64) from the same image
  set-favicon: true

#   DATA STORAGE

storage:
  # Storage type: yaml, sqlite, mysql
  type: yaml
  # MySQL settings (only if type is mysql)
  mysql:
    host: localhost
    port: 3306
    database: iraquecore
    username: root
    password: ""
    pool-size: 10
