
#   IraqueCoreV2 - Advanced Core Configuration
#   Fully Configurable

# General plugin settings
general:
  # Language (en, es, etc.)
  language: en
  # Automatically check for updates
  check-updates: true
  # Date format for placeholders
  date-format: "dd/MM/yyyy HH:mm"


#   CHAT FORMAT SETTINGS

chat:
  # Global chat format
  # Placeholders:
  #   {prefix} - Rank prefix
  #   {suffix} - Rank suffix
  #   {player} - Player name
  #   {displayname} - Player display name
  #   {message} - Chat message
  #   {tag} - Equipped tag
  #   {world} - World name
  format: "{prefix}{tag}{player}{suffix}: {message}"
  # Whether to use ranks in chat
  use-ranks: true
  # Whether to use tags in chat
  use-tags: true


#   RANK SYSTEM

ranks:
  # Default rank given to new players
  default-rank: "Member"
  # List of predefined ranks
  ranks:
    Owner:
      prefix: "&4&lOwner &4"
      suffix: ""
      weight: 100
      color: "&4"
      permissions:
        - "iraquecore.*"
    Admin:
      prefix: "&c&lAdmin &c"
      suffix: ""
      weight: 90
      color: "&c"
      permissions:
        - "iraquecore.*"
    Mod:
      prefix: "&5&lMod &5"
      suffix: ""
      weight: 80
      color: "&5"
      permissions:
        - "iraquecore.rank"
        - "iraquecore.rank.set"
    VIP:
      prefix: "&6&lVIP &6"
      suffix: ""
      weight: 60
      color: "&6"
      permissions: []
    Member:
      prefix: "&7"
      suffix: ""
      weight: 50
      color: "&7"
      permissions: []


#   SCOREBOARD — IraqueSurvival

scoreboard:
  enabled: true

  title:
    text: "&6&lIRAQUE"
    animated: true
    ticks: 5
    animation:
      - "   &6&lIRAQUE SURVIVAL   "
      - "   &6&lIRAQUE SURVIVAL   "
      - "   &f&lI&6&lRAQUE SURVIVAL   "
      - "   &6&lI&f&lR&6&lAQUE SURVIVAL   "
      - "   &6&lIR&f&lA&6&lQUE SURVIVAL   "
      - "   &6&lIRA&f&lQ&6&lUE SURVIVAL   "
      - "   &6&lIRAQ&f&lU&6&lE SURVIVAL   "
      - "   &6&lIRAQU&f&lE&6&l SURVIVAL   "
      - "   &6&lIRAQUE &f&lS&6&lURVIVAL   "
      - "   &6&lIRAQUE S&f&lU&6&lRVIVAL   "
      - "   &6&lIRAQUE SU&f&lR&6&lVIVAL   "
      - "   &6&lIRAQUE SUR&f&lV&6&lIVAL   "
      - "   &6&lIRAQUE SURV&f&lI&6&lVAL   "
      - "   &6&lIRAQUE SURVI&f&lV&6&lAL   "
      - "   &6&lIRAQUE SURVIV&f&lA&6&lL   "
      - "   &6&lIRAQUE SURVIVA&f&lL   "
      - "   &6&lIRAQUE SURVIVAL   "
      - "   &6&lIRAQUE SURVIVAL   "
      - "   &6&lIRAQUE SURVIVA&f&lL   "
      - "   &6&lIRAQUE SURVIV&f&lA&6&lL   "
      - "   &6&lIRAQUE SURVI&f&lV&6&lAL   "
      - "   &6&lIRAQUE SURV&f&lI&6&lVAL   "
      - "   &6&lIRAQUE SUR&f&lV&6&lIVAL   "
      - "   &6&lIRAQUE SU&f&lR&6&lVIVAL   "
      - "   &6&lIRAQUE S&f&lU&6&lRVIVAL   "
      - "   &6&lIRAQUE &f&lS&6&lURVIVAL   "
      - "   &6&lIRAQUE SURVIVAL   "
      - "   &6&lIRAQUE SURVIVAL   "
      - "   &f&lIRAQUE SURVIVAL   "
      - "   &6&lIRAQUE SURVIVAL   "
      - "   &f&lIRAQUE SURVIVAL   "
      - "   &6&lIRAQUE SURVIVAL   "
      - "   &6&lIRAQUE SURVIVAL   "

  update:
    amount: 2
    unit: "seconds"

  #  Available placeholders
  # {player}        → player name
  # {displayname}   → player display name
  # {online}        → connected players
  # {max}           → max server slots
  # {world}         → mundo actual
  # {ping}          → ping en ms
  # {blocks_broken} → blocks broken (yours)
  # {blocks_placed} → blocks placed (yours)
  # {deaths}        → muertes (tuyas)
  # {players}       → list of online players (comma separated)
  #
  # Supported colors:
  #   & codes     → &6, &l, &r, etc.
  #   Hex legacy  → &#RRGGBBText
  #   MiniMessage → <gold><bold>Text</bold></gold>  |  <#RRGGBB>Text</#RRGGBB>

  lines:
    - " "
    - "&7Jugador&8: &6{player}"
    - "&7Mundo&8: &6{world}"
    - "&7Ping&8: &6{ping}ms"
    - " "
    - "&7Bloques Rotos&8: &6{blocks_broken}"
    - "&7Bloques Puestos&8: &6{blocks_placed}"
    - "&7Muertes&8: &6{deaths}"
    - " "
    - "&7Online&8: &6{online}&7/&6{max}"
    - " "
    - "&ewww.iraque.gg"


#   AFK SYSTEM
#   When a player stays still for X minutes, their prefix changes to the AFK prefix

afk:
  enabled: true
  time-minutes: 5
  prefix: "&7[AFK] &7"

#   ARMOR STAND EDITOR
#   Sneak + right-click an armor stand to open the editor

armorstand:
  enabled: true

#   ANVIL COLORS
#   Allow players to use color codes (&) in anvils

anvil:
  enabled: true

#   SLEEP VOTING
#   When enough players sleep, night is skipped

sleep:
  enabled: true
  percentage: 50.0

#   PLAYTIME TRACKING
#   Track how long each player has been online

playtime:
  enabled: true


#   GRAVES
#   When a player dies, a chest spawns with their items

graves:
  enabled: true

#   DURABILITY WARNING
#   Warn players when their tool is about to break

durability-warning:
  enabled: true
  threshold: 0.1


#   DATA STORAGE

storage:
  # Storage type: yaml, sqlite, mysql
  type: yaml
  # MySQL settings (only if type is mysql)
  mysql:
    host: localhost
    port: 3306
    database: iraquecore
    username: root
    password: ""
    pool-size: 10
