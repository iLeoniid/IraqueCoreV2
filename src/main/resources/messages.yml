permission:
  no-permission: "&cYou don't have permission to manage permissions."
  player-not-found: "&cPlayer not found."
  usage-add: "&cUsage: /perm add <player> <permission>"
  usage-remove: "&cUsage: /perm remove <player> <permission>"
  usage-list: "&cUsage: /perm list <player>"
  usage-clear: "&cUsage: /perm clear <player>"
  usage-check: "&cUsage: /perm check <player> <permission>"
  added: "&aAdded permission &e{permission} &ato &e{player}"
  removed: "&cRemoved permission &e{permission} &cfrom &e{player}"
