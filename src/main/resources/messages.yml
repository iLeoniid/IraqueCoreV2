  help-remove: "&e/perm remove <player> <permission> &7- Remove a permission"
  help-list: "&e/perm list <player> &7- List player permissions"
  help-clear: "&e/perm clear <player> &7- Clear all player permissions"
  help-check: "&e/perm check <player> <permission> &7- Check if player has permission"

