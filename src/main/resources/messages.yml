# ─────────────────────────────────────────────
#   IraqueCore - Messages Configuration
#   All messages can be customized here
#   Color codes supported with & symbol
# ─────────────────────────────────────────────

prefix: "&8[&6IraqueCore&8] &7"

# ─── Reload Command ───
reload:
  success: "&aAll configurations reloaded successfully."
  failed: "&cAn error occurred while reloading configurations."

# ─── Spawn Commands ───
spawn:
  set: "&aSpawn location has been set."
  teleport: "&aTeleported to spawn."
  not-set: "&cSpawn has not been set yet."
  cooldown: "&cYou must wait {time} seconds before using /spawn again."

# ─── Rank Command ───
rank:
  given: "&2 You have been granted the rank {rank}"
  set: "&aYou set {player}'s rank to {rank}"
  removed: "&aRank {rank} removed."
  not-found: "&cRank not found!"
  player-not-found: "&cPlayer not found!"
  no-permission: "&cYou don't have permission to manage ranks."
  no-permission-set: "&cYou don't have permission to set ranks."
  usage-set: "&cUsage: /rank set <player> <rank>"
  usage-remove: "&cUsage: /rank remove <name>"
  list-header: "&6─── Ranks ───"
  list-entry: "&7  {name} &8(Weight: {weight})"
  your-rank: "&aYour rank: {rank}"
  info-header: "&aRank: {name} | Prefix: {prefix} | Weight: {weight}"
  not-found-info: "&cRank not found."
  create-hint: "&eUse config.yml to create custom ranks."
general:
  no-permission: "&cYou don't have permission to use this command."
  player-only: "&cOnly players can use this command."
  console-only: "&cOnly console can use this command."
  invalid-usage: "&cUsage: {usage}"
  player-not-found: "&cPlayer not found."

# ─── Gamemode Command ───
gamemode:
  no-permission: "&cNo permission."
  usage: "&cUsage: /{label} <mode> [player]"
  invalid: "&cInvalid gamemode. Use: 0/1/2/3 or survival/creative/adventure/spectator."
  no-permission-other: "&cNo permission to change other players' gamemode."
  player-not-found: "&cPlayer not found."
  player-only: "&cOnly players can use this command."
  set: "&aYour gamemode has been set to {mode}"
  set-other: "&aSet {player}'s gamemode to {mode}"

# ─── Tag Command ───
tag:
  reloaded: "&aTags reloaded."
  player-only: "&cOnly players can use this command."
  no-permission: "&cNo permission."
  set:
    usage: "&cUsage: /tag set <player> <tagId>"
    player-not-found: "&cPlayer not found."
    tag-not-found: "&cTag not found. Available IDs: {ids}"
    success: "&aSet {player}'s tag to {tag}"
    notify: "&aYour tag has been set to {tag} by an admin."
  gui:
    category-empty: "&cThis category has no tags available!"
    remove-success: "&aTag removed successfully!"
    remove-title: "Remove Tag"
    no-tag-equipped: "&7You don't have any tag equipped"
    no-tag-equipped-action: "&cYou don't have any tag equipped!"
    current-tag: "&7Current tag: {tag}"
    click-remove: "&e\u25b8 Click to remove"
    no-permission: "&cYou don't have permission to use this tag!"
    removed: "&aTag {tag} removed!"
    equipped: "&aTag equipped: {tag}"

# ─── Join / Quit Messages ───
join:
  first: "&6Welcome {player} &ato the server for the first time!"
  normal: "&8[&a+&8] &7{player} &ejoined"

quit:
  normal: "&8[&c-&8] &7{player} &eleft"

# ─── Msg / Reply ───
msg:
  player-only: "&cOnly players can use this command."
  usage: "&cUsage: /msg <player> <message>"
  player-not-found: "&cPlayer not found."
  cannot-self: "&cYou cannot message yourself."
  format-to: "&7[&aMe &7-> &a{target}&7] {message}"
  format-from: "&7[&a{sender} &7-> &aMe&7] {message}"

reply:
  player-only: "&cOnly players can use this command."
  usage: "&cUsage: /r <message>"
  nobody: "&cNobody has messaged you recently."
  not-online: "&cThat player is no longer online."

# ─── MOTD Command ───
motd:
  no-permission: "&cNo permission."
  usage: "&cUsage: /motd reload"
  reloaded: "&aMOTD reloaded."

# ─── Rank Help ───
rank:
  help-header: "&6\u2500\u2500\u2500 Rank Commands \u2500\u2500\u2500"
  help-list: "&e/rank list"
  help-info: "&e/rank info [player]"
  help-set: "&e/rank set <player> <rank>"
  help-create: "&e/rank create <name> <prefix> [weight]"

# ─── Leaderboard Command ───
leaderboard:
  player-only: "&cOnly players can use this command."

# ─── Whitelist Command ───
whitelist:
  usage: "&cUsage: /whitelist <on|off|add|remove|list|status>"
  usage-add: "&cUsage: /whitelist add <player>"
  usage-remove: "&cUsage: /whitelist remove <player>"
  enabled: "&aWhitelist enabled."
  disabled: "&cWhitelist disabled."
  added: "&a{player} has been added to the whitelist."
  already: "&e{player} is already whitelisted."
  removed: "&c{player} has been removed from the whitelist."
  not-whitelisted: "&e{player} is not whitelisted."
  list-header: "&6─── Whitelisted players ({count}) ───"
  list-empty: "&eNo players are whitelisted."
  status-on: "&aWhitelist is currently enabled."
  status-off: "&cWhitelist is currently disabled."

# ─── Scoreboard Command ───
scoreboard:
  player-only: "&cOnly players can use this command."
  status: "&7Scoreboard: {status}"
  usage: "&eUsage: /scoreboard on|off"
  enabled: "&aScoreboard enabled."
  disabled: "&cScoreboard disabled."

# ─── Stats ───
stats:
  saved: "&aStats have been saved successfully."
