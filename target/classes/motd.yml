# ─────────────────────────────────────────────
#   IraqueCore - MOTD Configuration
#   Color codes supported with & symbol
#   Server list MOTD that appears in
#   the multiplayer server browser.
# ─────────────────────────────────────────────

motd:
  # Static MOTD text (used when animated: false)
  text: "&6Welcome to &eMyServer &6- &a1.21.4 Survival"

  # Animated MOTD
  animated: false
  ticks: 40  # ticks between animation frames (20 ticks = 1 second)
  animation:
    - "&6Welcome to &eMyServer &6- &aSurvive & Build & Explore"
    - "&6Welcome to &eMyServer &6- &bNew updates every week!"
    - "&6Welcome to &eMyServer &6- &dJoin our Discord!"
    - "&6Welcome to &eMyServer &6- &aSeason 3 is live!"
